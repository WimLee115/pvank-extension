name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Upload chrome zip
        uses: actions/upload-artifact@v7
        with:
          name: pvank-extension-chrome
          path: releases/pvank-extension-chrome-*.zip
          if-no-files-found: error

      - name: Upload firefox zip
        uses: actions/upload-artifact@v7
        with:
          name: pvank-extension-firefox
          path: releases/pvank-extension-firefox-*.zip
          if-no-files-found: error
