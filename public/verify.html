<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PVANK · verifieer bewijs</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --fg: #e8e8e8;
        --dim: #6a6a6a;
        --accent: #ff6b35;
        --ok: #00ff41;
        --err: #ff3b3b;
        --line: #1a1a1a;
        --mono: "JetBrains Mono", "Fira Code", "DejaVu Sans Mono", monospace;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.6;
        padding: 32px 16px;
        min-height: 100vh;
      }
      main { max-width: 720px; margin: 0 auto; }
      header { text-align: center; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
      h1 { color: var(--accent); font-size: 20px; letter-spacing: 1px; }
      .tag { color: var(--dim); font-size: 12px; margin-top: 6px; }
      #drop {
        border: 2px dashed var(--accent);
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: 80ms;
      }
      #drop:hover, #drop.over { background: var(--line); }
      #drop p { color: var(--dim); }
      #drop p strong { color: var(--accent); }
      input[type="file"] { display: none; }
      #report { margin-top: 24px; }
      .row {
        display: grid;
        grid-template-columns: 28px 1fr auto;
        gap: 12px;
        padding: 10px 12px;
        border-left: 2px solid var(--line);
        margin-bottom: 4px;
        background: #0d0d0d;
      }
      .row.ok { border-left-color: var(--ok); }
      .row.err { border-left-color: var(--err); }
      .row.miss { border-left-color: var(--dim); }
      .icon { font-weight: 700; }
      .row.ok .icon { color: var(--ok); }
      .row.err .icon { color: var(--err); }
      .row.miss .icon { color: var(--dim); }
      .name { word-break: break-all; }
      .hash { color: var(--dim); font-size: 11px; }
      .summary { margin-top: 24px; padding: 16px; background: var(--line); }
      .summary .verdict { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
      .ok-text { color: var(--ok); }
      .err-text { color: var(--err); }
      footer { text-align: center; margin-top: 48px; color: var(--dim); font-size: 11px; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>░▒▓ PVANK · verifieer ▓▒░</h1>
        <p class="tag">vergelijk SHA-256 van elk bestand met manifest.json</p>
      </header>

      <label for="files" id="drop">
        <p><strong>sleep alle bestanden hierheen</strong></p>
        <p style="margin-top: 8px">of klik om te kiezen</p>
        <p style="margin-top: 8px; font-size: 11px">manifest.json + alle bestanden uit pvank-bewijs.zip</p>
      </label>
      <input type="file" id="files" multiple />

      <section id="report"></section>
    </main>

    <footer>
      werkt 100% offline · geen netwerk · geen tracking<br />
      voor blockchain-verificatie: <code>ots verify manifest.json.ots</code>
    </footer>

    <script>
      const drop = document.getElementById("drop");
      const fileInput = document.getElementById("files");
      const report = document.getElementById("report");

      drop.addEventListener("click", () => fileInput.click());
      drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("over"); });
      drop.addEventListener("dragleave", () => drop.classList.remove("over"));
      drop.addEventListener("drop", (e) => {
        e.preventDefault();
        drop.classList.remove("over");
        handle([...e.dataTransfer.files]);
      });
      fileInput.addEventListener("change", () => handle([...fileInput.files]));

      async function sha256(buf) {
        const d = await crypto.subtle.digest("SHA-256", buf);
        return [...new Uint8Array(d)].map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      async function handle(files) {
        report.innerHTML = "";
        const manifest = files.find((f) => f.name === "manifest.json");
        if (!manifest) {
          report.innerHTML = `<div class="row err"><span class="icon">✖</span><span>manifest.json ontbreekt</span><span></span></div>`;
          return;
        }
        const text = await manifest.text();
        let m;
        try { m = JSON.parse(text); } catch { report.innerHTML = `<div class="row err"><span class="icon">✖</span><span>manifest.json kapot</span><span></span></div>`; return; }

        let okCount = 0, errCount = 0, missCount = 0;
        for (const [name, info] of Object.entries(m.files || {})) {
          const f = files.find((x) => x.name === name);
          let row;
          if (!f) {
            missCount++;
            row = `<div class="row miss"><span class="icon">○</span><span class="name">${name}<br><span class="hash">${info.sha256}</span></span><span>ontbreekt</span></div>`;
          } else {
            const buf = await f.arrayBuffer();
            const hex = await sha256(buf);
            if (hex === info.sha256) {
              okCount++;
              row = `<div class="row ok"><span class="icon">✔</span><span class="name">${name}<br><span class="hash">${hex}</span></span><span>${f.size} B</span></div>`;
            } else {
              errCount++;
              row = `<div class="row err"><span class="icon">✖</span><span class="name">${name}<br><span class="hash">verwacht ${info.sha256}<br>gevonden ${hex}</span></span><span></span></div>`;
            }
          }
          report.insertAdjacentHTML("beforeend", row);
        }

        const verdict = errCount === 0 && missCount === 0
          ? `<span class="verdict ok-text">✔ INTACT</span>`
          : errCount > 0
            ? `<span class="verdict err-text">✖ AANGEPAST (${errCount} bestand${errCount === 1 ? "" : "en"} mismatch)</span>`
            : `<span class="verdict err-text">⚠ ONVOLLEDIG (${missCount} bestand${missCount === 1 ? "" : "en"} ontbreekt)</span>`;

        report.insertAdjacentHTML("beforeend",
          `<div class="summary">${verdict}<br>
            <span style="color: var(--dim); font-size: 12px">URL: ${m.url}<br>
            verzegeld: ${m.capturedAt}<br>
            manifest digest: ${m.digest}</span></div>`);
      }
    </script>
  </body>
</html>
