<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PVANK · ontsleutel bewijs</title>
    <style>
      :root {
        --bg: #050505;
        --surface: #0d0d0d;
        --line: #1a1a1a;
        --line-bright: #2a2a2a;
        --fg: #e8e8e8;
        --dim: #6a6a6a;
        --dim-2: #4a4a4a;
        --accent: #ff6b35;
        --ok: #00ff41;
        --err: #ff3b3b;
        --mono: "JetBrains Mono", "Fira Code", "DejaVu Sans Mono", monospace;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.6;
        padding: 40px 16px;
        min-height: 100vh;
      }
      main { max-width: 600px; margin: 0 auto; }
      header { text-align: center; padding-bottom: 18px; margin-bottom: 24px; border-bottom: 1px solid var(--line); }
      h1 { color: var(--accent); font-size: 22px; letter-spacing: 2px; }
      .tag { color: var(--dim); font-size: 12px; margin-top: 6px; letter-spacing: 1.5px; }
      .card { background: var(--surface); border: 1px solid var(--line); padding: 20px; margin-bottom: 18px; }
      h2 { color: var(--accent); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding-bottom: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--line); }
      label { display: block; color: var(--dim); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
      input[type="password"], input[type="file"] { width: 100%; background: var(--bg); color: var(--fg); border: 1px solid var(--line-bright); padding: 10px 12px; font-family: var(--mono); font-size: 13px; }
      input[type="password"]:focus { outline: none; border-color: var(--accent); }
      input[type="file"] { cursor: pointer; }
      button {
        background: var(--bg); color: var(--accent); border: 1px solid var(--accent);
        padding: 14px 28px; font-family: var(--mono); font-size: 13px; font-weight: 700;
        letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
        transition: all 140ms ease;
      }
      button:hover { background: var(--accent); color: var(--bg); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .ok { color: var(--ok); }
      .err { color: var(--err); }
      .msg { padding: 14px; border: 1px dashed var(--line-bright); background: var(--bg); margin-top: 14px; font-size: 12px; word-break: break-word; }
      footer { text-align: center; margin-top: 32px; color: var(--dim-2); font-size: 11px; }
      .hint { color: var(--dim); font-size: 11px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>░▒▓ PVANK · ontsleutel ▓▒░</h1>
        <p class="tag">decrypt PVENC bundle · 100% offline</p>
      </header>

      <section class="card">
        <h2>1 · bestand</h2>
        <input type="file" id="file" accept=".pvenc,application/octet-stream" />
        <p class="hint">Kies het <code>.pvenc</code> bestand dat je wilt ontsleutelen.</p>
      </section>

      <section class="card">
        <h2>2 · wachtwoord</h2>
        <label for="pw">password</label>
        <input type="password" id="pw" autocomplete="current-password" />
      </section>

      <section class="card">
        <h2>3 · ontsleutel</h2>
        <button id="go" type="button" disabled>▒▒ ONTSLEUTEL ▒▒</button>
        <div id="result" class="msg" hidden></div>
      </section>
    </main>

    <footer>
      werkt 100% offline · open dit bestand in elke browser, geen extensie nodig<br />
      AES-256-GCM · PBKDF2-SHA256 · 600.000 iteraties
    </footer>

    <script>
      const PVENC_MAGIC = new Uint8Array([0x50, 0x56, 0x45, 0x4e, 0x43, 0x01]);
      const SALT_LEN = 16;
      const IV_LEN = 12;
      const ITER = 600_000;

      const fileInput = document.getElementById("file");
      const pwInput = document.getElementById("pw");
      const goBtn = document.getElementById("go");
      const resultEl = document.getElementById("result");

      function check() {
        goBtn.disabled = !(fileInput.files?.[0] && pwInput.value.length >= 8);
      }
      fileInput.addEventListener("change", check);
      pwInput.addEventListener("input", check);

      goBtn.addEventListener("click", async () => {
        resultEl.hidden = true;
        resultEl.className = "msg";
        const file = fileInput.files[0];
        const pw = pwInput.value;
        try {
          const buf = new Uint8Array(await file.arrayBuffer());
          for (let i = 0; i < PVENC_MAGIC.length; i++) {
            if (buf[i] !== PVENC_MAGIC[i]) throw new Error("Niet een PVENC-bestand (magic mismatch).");
          }
          let off = PVENC_MAGIC.length;
          const salt = buf.slice(off, off + SALT_LEN); off += SALT_LEN;
          const iv = buf.slice(off, off + IV_LEN); off += IV_LEN;
          const ct = buf.slice(off);

          const enc = new TextEncoder();
          const baseKey = await crypto.subtle.importKey("raw", enc.encode(pw), { name: "PBKDF2" }, false, ["deriveKey"]);
          const key = await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"],
          );

          const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
          const blob = new Blob([plain], { type: "application/zip" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = file.name.replace(/\.pvenc$/i, ".zip");
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 60_000);

          resultEl.classList.add("ok");
          resultEl.textContent = "✔ ontsleuteld — download gestart als " + a.download;
          resultEl.hidden = false;
        } catch (err) {
          resultEl.classList.add("err");
          resultEl.textContent = "✖ " + (err.message?.includes("decrypt") || err.name === "OperationError" ? "verkeerd wachtwoord of bestand corrupt." : err.message);
          resultEl.hidden = false;
        }
      });
    </script>
  </body>
</html>
